[sales-campaign]
exten => _X!,1,NoOp(Sales campaign dialer through Python AGI)
 same => n,AGI(sales_quality_agi.py,${CALLCENTER_CALL_ID})
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

[lab-enterprise]
; Red Empresa: agentes y areas internas. Puede llamar a clientes simulados,
; al IVR/colas y conserva acceso al dialplan interno de FreePBX.
include => from-internal
exten => 5000,1,Goto(callcenter-ivr,5000,1)
exten => 6000,1,Goto(callcenter-queues,6000,1)
exten => 7000,1,Goto(callcenter-queues,7000,1)
exten => 8000,1,Goto(callcenter-queues,8000,1)
exten => _9XXX,1,Goto(from-internal,${EXTEN},1)

[lab-clients]
; Red Clientes Simulados: clientes de laboratorio por softphone.
; Pueden entrar al IVR principal y llamar al operador web, pero no
; llamar directo a supervisor ni a extensiones internas.
exten => 5000,1,Goto(callcenter-ivr,5000,1)
exten => 1099,1,Goto(from-internal,1099,1)
exten => 4001,1,NoOp(Cliente simulado bloqueado intentando llamar al supervisor)
 same => n,Playback(ss-noservice)
 same => n,Hangup()
exten => _X!,1,NoOp(Cliente simulado sin ruta directa permitida: ${EXTEN})
 same => n,Playback(ss-noservice)
 same => n,Hangup()

[callcenter-ivr]
exten => 5000,1,NoOp(IVR principal de call center laboratorio)
 same => n,Answer()
 same => n,Set(TIMEOUT(digit)=5)
 same => n,Set(TIMEOUT(response)=10)
 same => n,Read(IVR_OPTION,,1,,,10)
 same => n,GotoIf($["${IVR_OPTION}"="1"]?support,1)
 same => n,GotoIf($["${IVR_OPTION}"="2"]?sales,1)
 same => n,GotoIf($["${IVR_OPTION}"="3"]?marketing,1)
 same => n,GotoIf($["${IVR_OPTION}"="0"]?reception,1)
 same => n,Goto(reception,1)

exten => support,1,Goto(callcenter-queues,6000,1)
exten => sales,1,Goto(callcenter-queues,7000,1)
exten => marketing,1,Goto(callcenter-queues,8000,1)
exten => reception,1,Dial(PJSIP/1001,30)
 same => n,Hangup()

[callcenter-queues]
; Colas livianas de laboratorio. Para produccion se migran a Queue()
; administrado desde FreePBX, manteniendo estos numeros publicos.
exten => 6000,1,NoOp(Cola Soporte: 1001,1002,1003)
 same => n,Dial(PJSIP/1001&PJSIP/1002&PJSIP/1003,35)
 same => n,Hangup()

exten => 7000,1,NoOp(Cola Ventas: 3001)
 same => n,Dial(PJSIP/3001,35)
 same => n,Hangup()

exten => 8000,1,NoOp(Cola Marketing: 2001)
 same => n,Dial(PJSIP/2001,35)
 same => n,Hangup()
