services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  mongo:
    ports:
      - "${MONGO_PORT:-27017}:27017"

  floci:
    ports:
      - "${FLOCI_PORT:-4566}:4566"

  freepbx:
    ports:
      - "${AMI_HOST_PORT:-5038}:5038/tcp"
