name: sistema-telefonia

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - data_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  floci:
    image: floci/floci:latest
    restart: unless-stopped
    volumes:
      - floci_data:/app/data
    networks:
      - local_cloud_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - data_net

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - data_net

  host-network-agent:
    build:
      context: ./services/host-network-agent
    restart: unless-stopped
    network_mode: host
    environment:
      HOST_NETWORK_AGENT_PORT: ${HOST_NETWORK_AGENT_PORT:-7040}

  dialer-service:
    build:
      context: ./services/dialer
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      AMI_HOST: freepbx
      AMI_PORT: 5038
      CALL_MODE: ${CALL_MODE:-lab_internal}
    depends_on:
      redis:
        condition: service_started
      freepbx:
        condition: service_started
    networks:
      - app_net
      - data_net
      - voice_net

  transcription-service:
    build:
      context: ./services/transcription
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: callcenter
    depends_on:
      mongo:
        condition: service_started
    networks:
      - app_net
      - data_net

  metrics-service:
    build:
      context: ./services/metrics
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: callcenter
    depends_on:
      redis:
        condition: service_started
      mongo:
        condition: service_started
    networks:
      - app_net
      - data_net

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${BACKEND_PORT}
      NODE_ENV: production
      HOST_NETWORK_AGENT_URL: http://host.docker.internal:${HOST_NETWORK_AGENT_PORT:-7040}
      CALL_MODE: ${CALL_MODE:-lab_internal}
    ports:
      - "${BACKEND_PORT}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      floci:
        condition: service_started
      host-network-agent:
        condition: service_started
      dialer-service:
        condition: service_started
      transcription-service:
        condition: service_started
      metrics-service:
        condition: service_started
    volumes:
      - freepbx_var_data:/freepbx-var:ro
    networks:
      - app_net
      - data_net
      - voice_net
      - local_cloud_net

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT}
      VITE_WS_URL: ws://localhost:${BACKEND_PORT}
    ports:
      - "${FRONTEND_PORT}:5173"
    depends_on:
      - backend
    networks:
      - app_net

  freepbx-db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${FREEPBX_DB_ROOT_PASSWORD}
      MYSQL_USER: ${FREEPBX_DB_USER}
      MYSQL_PASSWORD: ${FREEPBX_DB_PASSWORD}
      TZ: ${TZ}
    volumes:
      - freepbx_mysql_data:/var/lib/mysql
      - ./freepbx/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - data_net
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p${FREEPBX_DB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 30

  freepbx:
    image: escomputers/freepbx:17-nofail2ban
    hostname: freepbx
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      FREEPBX_PROVISIONER_TOKEN: ${FREEPBX_PROVISIONER_TOKEN}
      TRANSCRIPTION_SERVICE_URL: http://transcription-service:7020
    ports:
      - "${FREEPBX_HTTP_PORT}:80/tcp"
      - "${FREEPBX_HTTPS_PORT}:443/tcp"
      - "8088:8088/tcp"
      - "8089:8089/tcp"
      - "5060:5060/udp"
      - "10000-10100:10000-10100/udp"
    volumes:
      - freepbx_var_data:/var
      - freepbx_etc_data:/etc
      - ./freepbx/manager_custom.conf:/etc/asterisk/manager_custom.conf:ro
      - ./freepbx/http_custom.conf:/etc/asterisk/http_custom.conf:ro
      - ./freepbx/pjsip.transports_custom.conf:/etc/asterisk/pjsip.transports_custom.conf:ro
      - ./freepbx/provisioner.php:/var/www/html/provisioner.php:ro
      - ./freepbx/extensions_custom.conf:/etc/asterisk/extensions_custom.conf:ro
      - ./freepbx/agi/sales_quality_agi.py:/var/lib/asterisk/agi-bin/sales_quality_agi.py:ro
    depends_on:
      freepbx-db:
        condition: service_healthy
    networks:
      - voice_net
      - data_net
      - app_net

volumes:
  postgres_data:
  floci_data:
  redis_data:
  mongo_data:
  freepbx_mysql_data:
  freepbx_var_data:
  freepbx_etc_data:

networks:
  voice_net:
    ipam:
      config:
        - subnet: 172.30.10.0/24
  app_net:
    ipam:
      config:
        - subnet: 172.30.20.0/24
  data_net:
    internal: true
    ipam:
      config:
        - subnet: 172.30.30.0/24
  local_cloud_net:
    ipam:
      config:
        - subnet: 172.30.40.0/24
